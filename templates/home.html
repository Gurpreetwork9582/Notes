{% extends "loginbase.html" %}

{% block content %}
<div class="bg-gray-800 p-8 rounded-2xl shadow-xl w-full max-w-2xl text-center">
    <h2 class="text-3xl font-bold mb-4 text-blue-400">Welcome to Auth App</h2>
    <p class="text-gray-300 mb-6">
        Use the links above to log in or create a new account.
    </p>
    <div class="flex flex-wrap justify-center gap-4">
        <a href="/login" class="px-6 py-3 bg-blue-600 hover:bg-blue-700 rounded-lg">Login</a>
        <a href="/register" class="px-6 py-3 bg-green-600 hover:bg-green-700 rounded-lg">Sign Up</a>
    </div>
</div>
{% endblock %}
