{% extends 'Base.html' %}
{% block body %}

<!-- FORM -->
<div class="bg-gray-800 p-6 rounded-2xl shadow-xl mb-10">
  <form method="POST" class="flex flex-col gap-4">

    <input type="text" name="topic"
      placeholder="Enter topic..."
      class="w-full px-4 py-3 rounded-lg bg-gray-700 border border-gray-600 focus:ring-2 focus:ring-blue-500 outline-none">

    <textarea name="note" rows="4"
      placeholder="Write your note here..."
      class="w-full px-4 py-3 rounded-lg bg-gray-700 border border-gray-600 focus:ring-2 focus:ring-blue-500 outline-none"></textarea>

    <button type="submit"
      class="bg-blue-600 hover:bg-blue-700 transition px-5 py-3 rounded-lg font-semibold shadow-lg">
      ➕ Add Note
    </button>

  </form>
</div>

<!-- NOTES GRID -->
<div class="grid sm:grid-cols-2 md:grid-cols-3 gap-6">

{% for i in All_Notes %}
  <div class="bg-gray-800 p-5 rounded-2xl shadow-lg hover:scale-105 transition">

    <h3 class="text-xl font-bold mb-2 text-blue-400">
      {{ i.topic }}
    </h3>

    <p class="text-gray-300 mb-4 break-words">
      {{ i.note }}
    </p>

    <div class="flex justify-between mt-4">

      <a href="/edit/{{i.id}}"
        class="bg-blue-500 hover:bg-blue-600 px-4 py-2 rounded-lg text-sm">
        Edit
      </a>

      <a href="/delete/{{i.id}}"
        class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded-lg text-sm">
        Delete
      </a>

    </div>

  </div>
{% endfor %}

</div>

{% endblock %}
