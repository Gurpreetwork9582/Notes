{% extends "loginbase.html" %}

{% block content %}

<div class="bg-gray-800 p-8 rounded-2xl shadow-xl w-full max-w-md">

    <h2 class="text-2xl font-bold mb-6 text-center text-blue-400">
        Login
    </h2>

    <form method="POST" action="/" class="flex flex-col gap-4">

        <input type="email" name="username"
            placeholder="Admin@admin.com"
            class="px-4 py-3 rounded-lg bg-gray-700 border border-gray-600 focus:ring-2 focus:ring-blue-500 outline-none">

        <input type="password" name="password"
            placeholder="admin"
            class="px-4 py-3 rounded-lg bg-gray-700 border border-gray-600 focus:ring-2 focus:ring-blue-500 outline-none">

      <!--  <label class="flex items-center gap-2 text-sm text-gray-300">
            <input type="checkbox" name="remember">
            Remember me
        </label>
    -->
        <button type="submit"
            class="bg-blue-600 hover:bg-blue-700 transition py-3 rounded-lg font-semibold">
            Login
        </button>

    </form>

    <p class="text-sm text-gray-400 mt-4 text-center">
        Don't have an account?
        <a href="/register" class="text-blue-400 hover:underline">Sign up</a>
    </p>

</div>

{% endblock %}
