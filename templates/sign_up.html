{% extends "loginbase.html" %}

{% block content %}

<div class="bg-gray-800 p-8 rounded-2xl shadow-xl w-full max-w-md">

    <h2 class="text-2xl font-bold mb-6 text-center text-green-400">
        Create Account
    </h2>

    <!-- Flash messages -->
    {% with messages = get_flashed_messages() %}
    {% if messages %}
        <div class="bg-red-500 text-white p-3 rounded mb-4 text-center">
            {{ messages[0] }}
        </div>
    {% endif %}
    {% endwith %}

    <form method="POST" action="/register" class="flex flex-col gap-4">

        <input type="text" name="username"
            placeholder="Full Name"
            class="px-4 py-3 rounded-lg bg-gray-700 border border-gray-600 focus:ring-2 focus:ring-green-500 outline-none">

        <input type="password" name="password"
            placeholder="Password"
            class="px-4 py-3 rounded-lg bg-gray-700 border border-gray-600 focus:ring-2 focus:ring-green-500 outline-none">

        <button type="submit"
            class="bg-green-500 hover:bg-green-600 transition py-3 rounded-lg font-semibold">
            Sign Up
        </button>

    </form>

    <p class="text-sm text-gray-400 mt-4 text-center">
        Already have an account?
        <a href="/loginuser" class="text-blue-400 hover:underline">Login</a>
    </p>

</div>

{% endblock %}
