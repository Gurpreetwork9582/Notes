<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Auth App</title>
</head>

<body class="bg-gradient-to-br from-gray-900 to-gray-800 text-white min-h-screen">

    <!-- Navbar -->
    <nav class="flex justify-between items-center px-8 py-4 bg-gray-900 shadow-lg">
        <h1 class="text-xl font-bold">🔐 Auth App</h1>

        <div class="flex gap-4">
            <a href="/notes" class="hover:text-blue-400">Home</a>
            <a href="/" class="hover:text-blue-400">Login</a>
            <a href="/register" class="hover:text-blue-400">Sign Up</a>
        </div>
    </nav>

    <!-- Flash messages -->
    {% with messages = get_flashed_messages() %}
    {% if messages %}
    <div class="max-w-3xl mx-auto mt-6 px-6 py-4 bg-red-500 rounded-lg text-white text-center">
        {{ messages[0] }}
    </div>
    {% endif %}
    {% endwith %}

    <!-- Content -->
    <div class="flex justify-center items-center mt-16">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
