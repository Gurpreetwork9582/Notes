{% extends 'Base.html'%}

{% block body %}

<div class="max-w-xl mx-auto bg-gray-800 p-6 rounded-2xl shadow-xl">

  <h2 class="text-2xl font-bold mb-4 text-center text-blue-400">
    ✏️ Edit Note
  </h2>

  <form method="POST" action="/edit/{{note_id.id}}" class="flex flex-col gap-4">

    <input type="text" name="topic"
      value="{{note_id.topic}}"
      class="w-full px-4 py-3 rounded-lg bg-gray-700 border border-gray-600 focus:ring-2 focus:ring-blue-500 outline-none">

    <textarea name="note" rows="5"
      class="w-full px-4 py-3 rounded-lg bg-gray-700 border border-gray-600 focus:ring-2 focus:ring-blue-500 outline-none">{{note_id.note}}</textarea>

    <button type="submit"
      class="bg-green-500 hover:bg-green-600 px-5 py-3 rounded-lg font-semibold shadow-lg">
      💾 Save Changes
    </button>

  </form>

</div>

{% endblock %}
